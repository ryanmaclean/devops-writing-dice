
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevOps Writing Dice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Libre Baskerville', serif;
        background-color: #e0e0e0; /* Slightly darker for contrast with retro elements */
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      .font-retro {
        font-family: 'Press Start 2P', cursive;
      }
      
      /* 3D Scene setup */
      .scene {
        perspective: 1000px; /* Further away for a flatter, isometric feel */
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .bounce-wrapper {
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
      }

      .cube {
        width: 100%;
        height: 100%;
        position: relative;
        transform-style: preserve-3d;
        /* Default state: Front face forward, pushed back by half size */
        transform: translateZ(calc(var(--die-half, 50px) * -1));
        transition: transform 0.6s cubic-bezier(0.15, 0.9, 0.35, 1.2); /* Bouncy return */
      }

      .cube-face {
        position: absolute;
        width: 100%;
        height: 100%;
        /* No border radius for low-poly chunkiness */
        border-radius: 0px; 
        display: flex;
        align-items: center;
        justify-content: center;
        backface-visibility: hidden;
        /* Hard borders and lighting for PS1 look */
        box-shadow: 
          inset 2px 2px 0px rgba(255,255,255,0.4),
          inset -2px -2px 0px rgba(0,0,0,0.4);
        border: 2px solid rgba(0,0,0,0.8);
      }

      /* Face positions using CSS Variable for dynamic sizing */
      .face-front  { transform: rotateY(  0deg) translateZ(var(--die-half, 50px)); }
      .face-right  { transform: rotateY( 90deg) translateZ(var(--die-half, 50px)); }
      .face-back   { transform: rotateY(180deg) translateZ(var(--die-half, 50px)); }
      .face-left   { transform: rotateY(-90deg) translateZ(var(--die-half, 50px)); }
      .face-top    { transform: rotateX( 90deg) translateZ(var(--die-half, 50px)); }
      .face-bottom { transform: rotateX(-90deg) translateZ(var(--die-half, 50px)); }

      /* Animation for rolling - Chaotic Tumble */
      @keyframes tumble {
        0% { transform: translateZ(calc(var(--die-half, 50px) * -1)) rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
        20% { transform: translateZ(calc(var(--die-half, 50px) * -1)) rotateX(70deg) rotateY(120deg) rotateZ(45deg); }
        40% { transform: translateZ(calc(var(--die-half, 50px) * -1)) rotateX(180deg) rotateY(240deg) rotateZ(90deg); }
        60% { transform: translateZ(calc(var(--die-half, 50px) * -1)) rotateX(270deg) rotateY(300deg) rotateZ(180deg); }
        80% { transform: translateZ(calc(var(--die-half, 50px) * -1)) rotateX(320deg) rotateY(340deg) rotateZ(270deg); }
        100% { transform: translateZ(calc(var(--die-half, 50px) * -1)) rotateX(360deg) rotateY(720deg) rotateZ(360deg); }
      }
      
      .animate-tumble {
        animation: tumble 0.4s linear infinite;
      }

      /* Landing Impact Animation - applied to wrapper */
      @keyframes land {
        0% { transform: scale(0.8); }
        40% { transform: scale(1.05); }
        70% { transform: scale(0.95); }
        100% { transform: scale(1); }
      }

      .animate-land {
        animation: land 0.4s ease-out;
      }
    </style>

{
